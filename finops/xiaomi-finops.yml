meters:
  - name: api_requests
    description: Placeholder request meter; actual billable lines depend on the partner
      agreement.
    unit: varies
    aggregation: sum
principles:
  - name: Visibility
    description: Until a partner agreement is signed, there is no usage telemetry surface
      for Xiaomi APIs; rely on internal client-side counters.
  - name: Allocation
    description: Tag any client-side calls with consuming team, app, and region so that
      negotiated commitments can be allocated post-contract.
  - name: Optimization
    description: Negotiate volume tiers and regional pricing (CN vs Global) directly during
      partner onboarding.
  - name: Accountability
    description: Spend ownership sits with the business unit signing the Mi partner
      agreement.
