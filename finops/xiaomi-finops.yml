  - https://developer.xiaomi.com/
notes: |
  No public pricing or invoice line-item documentation is available for Xiaomi developer
  APIs. Meters and FOCUS columns below are minimal placeholders until terms are issued
  under the Mi developer / partner program.
billingModel:
  pricingCategory: Contact Sales
  billingFrequency: Per-Invoice
  billingCurrency: USD (settlement varies)
  chargeCategories:
    - Usage
    - Purchase
