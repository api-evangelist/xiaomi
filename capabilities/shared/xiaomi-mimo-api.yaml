naftiko: "1.0.0-alpha1"

info:
  label: "Xiaomi MiMo AI API"
  description: "OpenAI-compatible access to Xiaomi's MiMo large language models for chat completions, reasoning, coding, and multimodal tasks."
  tags:
    - Xiaomi
    - Artificial Intelligence
    - Language Models
    - Chat Completions
  created: "2026-05-03"
  modified: "2026-05-03"

binds:
  - namespace: env
    keys:
      XIAOMI_MIMO_API_KEY: XIAOMI_MIMO_API_KEY

capability:
  consumes:
    - type: http
      namespace: xiaomi-mimo-api
      baseUri: https://api.xiaomimimo.com
      description: "Xiaomi MiMo AI API for chat completions."
      authentication:
        type: apikey
        key: api-key
        value: "{{XIAOMI_MIMO_API_KEY}}"
        placement: header
      resources:
        - name: chat-completions
          path: /v1/chat/completions
          description: "Chat completion generation."
          operations:
            - name: create-chat-completion
              method: POST
              description: "Creates a chat completion from the specified MiMo model."
              inputParameters: []
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  model: "{{tools.model}}"
                  messages: "{{tools.messages}}"
                  temperature: "{{tools.temperature}}"
                  max_tokens: "{{tools.max_tokens}}"
                  stream: "{{tools.stream}}"

        - name: models
          path: /v1/models
          description: "Available MiMo AI models."
          operations:
            - name: list-models
              method: GET
              description: "Returns a list of available MiMo AI models."
              inputParameters: []
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      port: 8102
      namespace: xiaomi-mimo-api-rest
      resources:
        - path: /v1/chat/completions
          name: chat-completions
          description: "MiMo chat completions."
          operations:
            - method: POST
              name: create-chat-completion
              description: "Create a chat completion."
              call: "xiaomi-mimo-api.create-chat-completion"
              outputParameters:
                - type: object
                  mapping: "$."

        - path: /v1/models
          name: models
          description: "Available models."
          operations:
            - method: GET
              name: list-models
              description: "List available MiMo models."
              call: "xiaomi-mimo-api.list-models"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9102
      namespace: xiaomi-mimo-api-mcp
      transport: http
      tools:
        - name: create-chat-completion
          description: "Create a chat completion using Xiaomi MiMo AI models."
          hints:
            readOnly: false
            destructive: false
            idempotent: false
          call: "xiaomi-mimo-api.create-chat-completion"
          with:
            model: "tools.model"
            messages: "tools.messages"
          outputParameters:
            - type: object
              mapping: "$."

        - name: list-models
          description: "List available Xiaomi MiMo AI models."
          hints:
            readOnly: true
            openWorld: false
          call: "xiaomi-mimo-api.list-models"
          outputParameters:
            - type: object
              mapping: "$."
