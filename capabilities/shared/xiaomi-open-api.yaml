naftiko: "1.0.0-alpha1"

info:
  label: "Xiaomi Open API"
  description: "OAuth 2.0 based access to Xiaomi user account data including profile, contact, friend lists, and identity verification."
  tags:
    - Xiaomi
    - Identity
    - OAuth
    - User Profile
  created: "2026-05-03"
  modified: "2026-05-03"

binds:
  - namespace: env
    keys:
      XIAOMI_ACCESS_TOKEN: XIAOMI_ACCESS_TOKEN
      XIAOMI_CLIENT_ID: XIAOMI_CLIENT_ID

capability:
  consumes:
    - type: http
      namespace: xiaomi-open-api
      baseUri: https://open.account.xiaomi.com
      description: "Xiaomi OAuth 2.0 user account API."
      authentication:
        type: apikey
        key: Authorization
        value: "Bearer {{XIAOMI_ACCESS_TOKEN}}"
        placement: header
      resources:
        - name: user-profile
          path: /user/profile
          description: "User profile information."
          operations:
            - name: get-user-profile
              method: GET
              description: "Retrieves the authenticated user's profile including nickname, ID, and avatar."
              inputParameters:
                - name: clientId
                  in: query
                  type: integer
                  required: true
                  description: "The allocated application client ID."
                - name: token
                  in: query
                  type: string
                  required: true
                  description: "The OAuth 2.0 access token."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: user-openid
          path: /user/openidV2
          description: "User unique OpenID."
          operations:
            - name: get-user-open-id
              method: GET
              description: "Retrieves the authenticated user's unique OpenID."
              inputParameters:
                - name: clientId
                  in: query
                  type: integer
                  required: true
                  description: "Application client ID."
                - name: token
                  in: query
                  type: string
                  required: true
                  description: "OAuth 2.0 access token."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: user-contact
          path: /user/phoneAndEmail
          description: "User phone and email contact information."
          operations:
            - name: get-user-phone-and-email
              method: GET
              description: "Retrieves the user's phone number and email address."
              inputParameters:
                - name: clientId
                  in: query
                  type: integer
                  required: true
                  description: "Application client ID."
                - name: token
                  in: query
                  type: string
                  required: true
                  description: "OAuth 2.0 access token."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: user-friends
          path: /user/relation
          description: "User MiChat friend list."
          operations:
            - name: get-user-friend-list
              method: GET
              description: "Retrieves the user's MiChat friend list."
              inputParameters:
                - name: clientId
                  in: query
                  type: integer
                  required: true
                  description: "Application client ID."
                - name: token
                  in: query
                  type: string
                  required: true
                  description: "OAuth 2.0 access token."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      port: 8100
      namespace: xiaomi-open-api-rest
      resources:
        - path: /v1/user/profile
          name: user-profile
          description: "User profile endpoint."
          operations:
            - method: GET
              name: get-user-profile
              description: "Get user profile."
              call: "xiaomi-open-api.get-user-profile"
              outputParameters:
                - type: object
                  mapping: "$."

        - path: /v1/user/openid
          name: user-openid
          description: "User OpenID endpoint."
          operations:
            - method: GET
              name: get-user-open-id
              description: "Get user OpenID."
              call: "xiaomi-open-api.get-user-open-id"
              outputParameters:
                - type: object
                  mapping: "$."

        - path: /v1/user/contact
          name: user-contact
          description: "User contact info endpoint."
          operations:
            - method: GET
              name: get-user-phone-and-email
              description: "Get user phone and email."
              call: "xiaomi-open-api.get-user-phone-and-email"
              outputParameters:
                - type: object
                  mapping: "$."

        - path: /v1/user/friends
          name: user-friends
          description: "User friend list endpoint."
          operations:
            - method: GET
              name: get-user-friend-list
              description: "Get user friend list."
              call: "xiaomi-open-api.get-user-friend-list"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9100
      namespace: xiaomi-open-api-mcp
      transport: http
      tools:
        - name: get-user-profile
          description: "Get Xiaomi user profile (nickname, ID, avatar)."
          hints:
            readOnly: true
            openWorld: false
          call: "xiaomi-open-api.get-user-profile"
          outputParameters:
            - type: object
              mapping: "$."

        - name: get-user-open-id
          description: "Get Xiaomi user OpenID."
          hints:
            readOnly: true
            openWorld: false
          call: "xiaomi-open-api.get-user-open-id"
          outputParameters:
            - type: object
              mapping: "$."

        - name: get-user-phone-and-email
          description: "Get Xiaomi user phone and email."
          hints:
            readOnly: true
            openWorld: false
          call: "xiaomi-open-api.get-user-phone-and-email"
          outputParameters:
            - type: object
              mapping: "$."

        - name: get-user-friend-list
          description: "Get Xiaomi user MiChat friend list."
          hints:
            readOnly: true
            openWorld: false
          call: "xiaomi-open-api.get-user-friend-list"
          outputParameters:
            - type: object
              mapping: "$."
