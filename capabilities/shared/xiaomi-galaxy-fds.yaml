naftiko: "1.0.0-alpha1"

info:
  label: "Xiaomi Galaxy FDS API"
  description: "Xiaomi Galaxy File Data Storage REST API for cloud object storage operations including bucket management, object CRUD, ACL, multipart uploads, and CDN operations."
  tags:
    - Xiaomi
    - Cloud Storage
    - Object Storage
    - File Storage
  created: "2026-05-03"
  modified: "2026-05-03"

binds:
  - namespace: env
    keys:
      XIAOMI_FDS_ACCESS_KEY: XIAOMI_FDS_ACCESS_KEY
      XIAOMI_FDS_SECRET_KEY: XIAOMI_FDS_SECRET_KEY

capability:
  consumes:
    - type: http
      namespace: xiaomi-galaxy-fds
      baseUri: https://cnbj0.fds.api.xiaomi.com
      description: "Xiaomi Galaxy FDS object storage REST API."
      authentication:
        type: apikey
        key: Authorization
        value: "Galaxy {{XIAOMI_FDS_ACCESS_KEY}}:{{XIAOMI_FDS_SECRET_KEY}}"
        placement: header
      resources:
        - name: objects
          path: /{bucketName}/{objectName}
          description: "Object operations."
          operations:
            - name: put-object
              method: PUT
              description: "Uploads an object to the specified bucket."
              inputParameters:
                - name: bucketName
                  in: path
                  type: string
                  required: true
                  description: "Target bucket name."
                - name: objectName
                  in: path
                  type: string
                  required: true
                  description: "Object key/name."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

            - name: get-object
              method: GET
              description: "Retrieves an object from the specified bucket."
              inputParameters:
                - name: bucketName
                  in: path
                  type: string
                  required: true
                  description: "Bucket name."
                - name: objectName
                  in: path
                  type: string
                  required: true
                  description: "Object key/name."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

            - name: head-object
              method: HEAD
              description: "Retrieves object metadata without the body."
              inputParameters:
                - name: bucketName
                  in: path
                  type: string
                  required: true
                  description: "Bucket name."
                - name: objectName
                  in: path
                  type: string
                  required: true
                  description: "Object key/name."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

            - name: delete-object
              method: DELETE
              description: "Deletes the specified object from the bucket."
              inputParameters:
                - name: bucketName
                  in: path
                  type: string
                  required: true
                  description: "Bucket name."
                - name: objectName
                  in: path
                  type: string
                  required: true
                  description: "Object key/name."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      port: 8101
      namespace: xiaomi-galaxy-fds-rest
      resources:
        - path: /v1/buckets/{bucketName}/objects/{objectName}
          name: objects
          description: "Object management."
          operations:
            - method: PUT
              name: put-object
              description: "Upload an object."
              call: "xiaomi-galaxy-fds.put-object"
              with:
                bucketName: "rest.bucketName"
                objectName: "rest.objectName"
              outputParameters:
                - type: object
                  mapping: "$."
            - method: GET
              name: get-object
              description: "Retrieve an object."
              call: "xiaomi-galaxy-fds.get-object"
              with:
                bucketName: "rest.bucketName"
                objectName: "rest.objectName"
              outputParameters:
                - type: object
                  mapping: "$."
            - method: DELETE
              name: delete-object
              description: "Delete an object."
              call: "xiaomi-galaxy-fds.delete-object"
              with:
                bucketName: "rest.bucketName"
                objectName: "rest.objectName"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9101
      namespace: xiaomi-galaxy-fds-mcp
      transport: http
      tools:
        - name: put-object
          description: "Upload an object to Xiaomi Galaxy FDS."
          hints:
            readOnly: false
            destructive: false
            idempotent: false
          call: "xiaomi-galaxy-fds.put-object"
          outputParameters:
            - type: object
              mapping: "$."

        - name: get-object
          description: "Retrieve an object from Xiaomi Galaxy FDS."
          hints:
            readOnly: true
            openWorld: false
          call: "xiaomi-galaxy-fds.get-object"
          outputParameters:
            - type: object
              mapping: "$."

        - name: head-object
          description: "Get object metadata from Xiaomi Galaxy FDS."
          hints:
            readOnly: true
            openWorld: false
          call: "xiaomi-galaxy-fds.head-object"
          outputParameters:
            - type: object
              mapping: "$."

        - name: delete-object
          description: "Delete an object from Xiaomi Galaxy FDS."
          hints:
            readOnly: false
            destructive: true
            idempotent: true
          call: "xiaomi-galaxy-fds.delete-object"
          outputParameters:
            - type: object
              mapping: "$."
