naftiko: 1.0.0-alpha2
info:
  label: Xiaomi Galaxy FDS API — Multipart Upload
  description: 'Xiaomi Galaxy FDS API — Multipart Upload. 4 operations. Lead operation: Upload Part. Self-contained Naftiko
    capability covering one Xiaomi business surface.'
  tags:
  - Xiaomi
  - Multipart Upload
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    XIAOMI_API_KEY: XIAOMI_API_KEY
capability:
  consumes:
  - type: http
    namespace: galaxy-fds-multipart-upload
    baseUri: https://cnbj0.fds.api.xiaomi.com
    description: Xiaomi Galaxy FDS API — Multipart Upload business capability. Self-contained, no shared references.
    resources:
    - name: bucketName-objectName}?partNumber={partNumber}&uploadId={uploadId
      path: /{bucketName}/{objectName}?partNumber={partNumber}&uploadId={uploadId}
      operations:
      - name: uploadpart
        method: PUT
        description: Upload Part
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: bucketName
          in: path
          type: string
          required: true
        - name: objectName
          in: path
          type: string
          required: true
        - name: partNumber
          in: path
          type: integer
          required: true
        - name: uploadId
          in: path
          type: string
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: bucketName-objectName}?uploadId={uploadId
      path: /{bucketName}/{objectName}?uploadId={uploadId}
      operations:
      - name: completemultipartupload
        method: POST
        description: Complete Multipart Upload
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: bucketName
          in: path
          type: string
          required: true
        - name: objectName
          in: path
          type: string
          required: true
        - name: uploadId
          in: path
          type: string
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
      - name: abortmultipartupload
        method: DELETE
        description: Abort Multipart Upload
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: bucketName
          in: path
          type: string
          required: true
        - name: objectName
          in: path
          type: string
          required: true
        - name: uploadId
          in: path
          type: string
          required: true
    - name: bucketName-objectName}?uploads
      path: /{bucketName}/{objectName}?uploads
      operations:
      - name: initiatemultipartupload
        method: POST
        description: Initiate Multipart Upload
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: bucketName
          in: path
          type: string
          required: true
        - name: objectName
          in: path
          type: string
          required: true
  exposes:
  - type: rest
    namespace: galaxy-fds-multipart-upload-rest
    port: 8080
    description: REST adapter for Xiaomi Galaxy FDS API — Multipart Upload. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/{bucketname}/{objectname-partnumber-partnumber-uploadid-uploadid}
      name: bucketname-objectname-partnumber-partnumber-uploadid-uploadid
      description: REST surface for bucketName-objectName}?partNumber={partNumber}&uploadId={uploadId.
      operations:
      - method: PUT
        name: uploadpart
        description: Upload Part
        call: galaxy-fds-multipart-upload.uploadpart
        with:
          bucketName: rest.bucketName
          objectName: rest.objectName
          partNumber: rest.partNumber
          uploadId: rest.uploadId
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/{bucketname}/{objectname-uploadid-uploadid}
      name: bucketname-objectname-uploadid-uploadid
      description: REST surface for bucketName-objectName}?uploadId={uploadId.
      operations:
      - method: POST
        name: completemultipartupload
        description: Complete Multipart Upload
        call: galaxy-fds-multipart-upload.completemultipartupload
        with:
          bucketName: rest.bucketName
          objectName: rest.objectName
          uploadId: rest.uploadId
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: abortmultipartupload
        description: Abort Multipart Upload
        call: galaxy-fds-multipart-upload.abortmultipartupload
        with:
          bucketName: rest.bucketName
          objectName: rest.objectName
          uploadId: rest.uploadId
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/{bucketname}/objectname-uploads
      name: bucketname-objectname-uploads
      description: REST surface for bucketName-objectName}?uploads.
      operations:
      - method: POST
        name: initiatemultipartupload
        description: Initiate Multipart Upload
        call: galaxy-fds-multipart-upload.initiatemultipartupload
        with:
          bucketName: rest.bucketName
          objectName: rest.objectName
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: galaxy-fds-multipart-upload-mcp
    port: 9090
    transport: http
    description: MCP adapter for Xiaomi Galaxy FDS API — Multipart Upload. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: upload-part
      description: Upload Part
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: galaxy-fds-multipart-upload.uploadpart
      with:
        bucketName: tools.bucketName
        objectName: tools.objectName
        partNumber: tools.partNumber
        uploadId: tools.uploadId
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: complete-multipart-upload
      description: Complete Multipart Upload
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: galaxy-fds-multipart-upload.completemultipartupload
      with:
        bucketName: tools.bucketName
        objectName: tools.objectName
        uploadId: tools.uploadId
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: abort-multipart-upload
      description: Abort Multipart Upload
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: galaxy-fds-multipart-upload.abortmultipartupload
      with:
        bucketName: tools.bucketName
        objectName: tools.objectName
        uploadId: tools.uploadId
      outputParameters:
      - type: object
        mapping: $.
    - name: initiate-multipart-upload
      description: Initiate Multipart Upload
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: galaxy-fds-multipart-upload.initiatemultipartupload
      with:
        bucketName: tools.bucketName
        objectName: tools.objectName
      outputParameters:
      - type: object
        mapping: $.
