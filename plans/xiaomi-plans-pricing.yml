specification: API Commons Plans
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/Plans
provider: Xiaomi
providerId: xiaomi
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - Consumer Electronics
  - IoT
  - Smart Home
  - Mobile
  - Artificial Intelligence
description: Xiaomi does not publish a public, self-serve developer pricing page for its
  open API surface (open.account.xiaomi.com, Galaxy FDS, MiMo AI). Access to the developer
  portal is gated behind a Mi account and partner onboarding, with commercial terms negotiated
  directly. No verifiable per-call price exists at this time.
sources:
  - https://dev.mi.com/
  - https://developer.xiaomi.com/
notes: |
  WebFetch of the Xiaomi developer portal (developer.xiaomi.com, dev.mi.com) returned
  TLS / 403 errors and the public marketing site does not document API plans. Treated as
  partner-gated; reconciled only to a Contact Sales scaffold.
plans:
  - id: xiaomi-contact-sales
    name: Contact Sales
    type: enterprise
    description: Commercial terms for Xiaomi APIs are negotiated directly via the Mi
      developer / partner program; no public price card is published.
    entries:
      - label: Custom Commercial Terms
        name: custom
        type: flat
        metric: varies
        limit: -1
        timeFrame: usage
        geo: global
        unit: 1
        price: contact sales
        userMultiplied: false
    elements:
      - name: Mi Developer Program access
      - name: Partner onboarding and review
      - name: Region-specific terms (CN / Global)
maintainers:
