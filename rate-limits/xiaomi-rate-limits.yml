specification: API Commons Rate Limits
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/RateLimits
provider: Xiaomi
providerId: xiaomi
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - Consumer Electronics
  - IoT
  - Mobile
  - Rate Limiting
description: Xiaomi does not publish documented rate limits for its open API surface on
  publicly reachable pages. Limits are enforced server-side and communicated only to
  partners onboarded through the Mi developer program.
sources:
  - https://dev.mi.com/
  - https://developer.xiaomi.com/
responseCodes:
  throttled: 429
limits:
  - name: Per-partner throttling (undocumented)
    scope: account
    metric: varies
    limit: see Mi developer / partner agreement
    notes: Public docs do not enumerate per-second or per-minute numbers; treat as varies
      until partner-specific terms are issued.
policies:
  - name: Partner Gating
    description: Production access requires partner approval through the Mi developer
      program; sandbox quotas are issued case-by-case.
  - name: Backoff
    description: Clients should implement exponential backoff with jitter on any 429 or
      5xx response; honor any Retry-After header if present.
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
